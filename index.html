<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GEN Friction Finder</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>GEN Friction Finder</h1>
      <p>Поиск фрикционов АКПП по наружному диаметру, зубьям и модели</p>
    </header>

    <section class="search-box">
      <input id="od" type="number" step="0.1" placeholder="Наружный Ø, мм">
      <input id="teeth" type="number" placeholder="Зубья">
      <input id="model" type="text" placeholder="Модель АКПП">
      <button id="reset">Сброс</button>
    </section>

    <section id="results" class="results"></section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
