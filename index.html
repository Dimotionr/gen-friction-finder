<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEN Friction Finder</title>
</head>
<body>
  <h1>GEN Friction Finder</h1>
  <p>Каталог фрикционов АКПП</p>

  <input id="diameter" placeholder="Наружный диаметр, мм">
  <input id="teeth" placeholder="Количество зубьев">

  <button onclick="search()">Найти</button>

  <div id="result"></div>

  <script>
    const data = [
      { od: 108, teeth: 36, model: "ZF 4HP18 / 5HP18 / 5HP19", pack: "E" },
      { od: 138, teeth: 36, model: "Jatco JF011E / RE0F10A", pack: "Forward" },
      { od: 155, teeth: 36, model: "GM 5L40E", pack: "Direct / 2nd Coast" },
      { od: 160, teeth: 36, model: "Hyundai A6GF1", pack: "Underdrive" },
      { od: 162, teeth: 36, model: "Toyota A750E / A760E", pack: "Direct" },
      { od: 164, teeth: 36, model: "Mercedes 722.6", pack: "K2 Large ID" }
    ];

    function search() {
      const diameter = Number(document.getElementById("diameter").value);
      const teeth = Number(document.getElementById("teeth").value);

      const result = data.filter(item =>
        (!diameter || Math.abs(item.od - diameter) <= 2) &&
        (!teeth || item.teeth === teeth)
      );

      document.getElementById("result").innerHTML = result.map(item =>
        `<p><b>${item.od} мм</b> — ${item.teeth} зубьев — ${item.model} — ${item.pack}</p>`
      ).join("") || "Ничего не найдено";
    }
  </script>
</body>
</html>
